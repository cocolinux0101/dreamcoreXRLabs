# Netlify config for Dreamcore XR Labs Website
# This folder is a static site — drag-and-drop deploy. No build step needed.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/babel; charset=utf-8"

# SPA-style fallback: unknown routes serve index.html (200, not a redirect)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
